<!DOCTYPE html>
<html>
<head>
    <title>AI Room Chat</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        #chat-box {
            width: 400px;
            height: 400px;
            border: 1px solid black;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .message {
            padding: 8px;
            margin: 5px 0;
            background-color: #f1f1f1;
            border-radius: 5px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>AI Room - User3</h2>

<div id="chat-box"></div>

<input type="text" id="msg" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script>

    // user3 joins ai-room
    const ws = new WebSocket(
        "ws://127.0.0.1:8000/ws/ai-room/user3"
    );

    const chatBox = document.getElementById("chat-box");

    ws.onopen = () => {
        addMessage("Connected to AI Room");
    };

    ws.onmessage = (event) => {
        addMessage(event.data);
    };

    ws.onerror = (error) => {
        addMessage("WebSocket Error");
        console.log(error);
    };

    function sendMessage() {

        const input = document.getElementById("msg");

        ws.send(input.value);

        input.value = "";
    }

    function addMessage(message) {

        const div = document.createElement("div");

        div.classList.add("message");

        div.textContent = message;

        chatBox.appendChild(div);

        chatBox.scrollTop = chatBox.scrollHeight;
    }

</script>

</body>
</html>
