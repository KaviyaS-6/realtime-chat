<!DOCTYPE html>
<html>

<head>

    <title>Realtime Chat App</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
        }

        #chat-box {

            width: 500px;
            height: 500px;

            border: 1px solid black;

            overflow-y: auto;

            padding: 10px;

            margin-bottom: 10px;

            background: #fafafa;
        }

        .message {

            padding: 10px;

            margin: 8px 0;

            border-radius: 5px;

            background: #f1f1f1;
        }

        .mine {

            background: #d1ffd1;
        }

        .seen {

            color: green;

            font-size: 12px;

            margin-top: 5px;
        }

        .system {

            background: #e8e8e8;

            font-style: italic;
        }

        #typing {

            color: blue;

            margin-bottom: 10px;
        }

        input {

            width: 300px;

            padding: 8px;
        }

        button {

            padding: 8px 14px;

            margin-left: 5px;
        }

    </style>

</head>

<body>

<h2>User2</h2>

<div id="chat-box"></div>

<div id="typing"></div>

<input
    type="text"
    id="msg"
    placeholder="Type message"
/>

<button onclick="sendMessage()">
    Send
</button>

<script>

const username = "user2";

/*
GET TOKEN:

POST http://127.0.0.1:8000/login

BODY:
"user1"
*/

const token =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyMiIsImV4cCI6MTc3OTA0MTM3MX0.sGVQVw67qzzTq9liFbCYzcXfjf77sRQjFD2tjp4Biuo";
const ws = new WebSocket(
    `ws://127.0.0.1:8000/ws/python-room?token=${token}`
);

const chatBox =
    document.getElementById("chat-box");

const typingDiv =
    document.getElementById("typing");

let typingTimeout = null;


// ---------------- CONNECT ----------------
ws.onopen = () => {

    console.log("CONNECTED");

    addSystemMessage("Connected");
};


// ---------------- RECEIVE ----------------
ws.onmessage = (event) => {

    console.log("RECEIVED:", event.data);

    const data = JSON.parse(event.data);

    // ---------- MESSAGE ----------
    if (data.type === "message") {

        addMessage(
            data.message_id,
            data.user,
            data.text,
            data.seen,
            data.timestamp
        );

        if (data.user !== username) {

            ws.send(JSON.stringify({
                type: "seen",
                message_id: data.message_id
            }));
        }
    }
    // ---------- TYPING ----------
    else if (
        data.type === "typing" &&
        data.user !== username
    ) {

        typingDiv.innerText =
            data.user + " is typing...";

        setTimeout(() => {

            typingDiv.innerText = "";

        }, 1000);
    }

    // ---------- PRESENCE ----------
    else if (data.type === "presence") {

        addSystemMessage(
            data.user + " is " + data.status
        );
    }

    // ---------- SEEN ----------
    
    else if (data.type === "seen") {

        const msg =
            document.getElementById(
                data.message_id
            );

        if (!msg) return;

        // prevent duplicate seen labels
        const existingSeen =
            msg.querySelector(".seen");

        if (existingSeen) return;

        const seenDiv =
            document.createElement("div");

        seenDiv.className = "seen";

        seenDiv.innerText =
            "Seen";

        msg.appendChild(seenDiv);
    }
    // ---------- ERROR ----------
    else if (data.type === "error") {

        addSystemMessage(
            "ERROR: " + data.message
        );
    }
};


// ---------------- SEND MESSAGE ----------------
function sendMessage() {

    const input =
        document.getElementById("msg");

    const text =
        input.value.trim();

    if (text === "") {
        return;
    }

    const payload = {

        type: "message",

        text: text
    };

    console.log("SENDING:", payload);

    ws.send(
        JSON.stringify(payload)
    );

    input.value = "";
}


// ---------------- TYPING ----------------
document
    .getElementById("msg")
    .addEventListener("input", () => {

        if (typingTimeout) {
            return;
        }

        ws.send(JSON.stringify({
            type: "typing"
        }));

        typingTimeout = setTimeout(() => {

            typingTimeout = null;

        }, 1000);
    });


// ---------------- ADD MESSAGE ----------------
function addMessage(
    messageId,
    user,
    text,
    seen=false,
    timestamp=""
) {

    const div =
        document.createElement("div");

    div.className =
        user === username
        ? "message mine"
        : "message";

    const time =
        new Date(timestamp)
        .toLocaleTimeString();

    div.id = messageId;

    div.innerHTML = `
        <b>${user}</b><br>

        ${text}

        <div style="
            font-size:12px;
            color:gray;
            margin-top:5px;
        ">
            ${time}
        </div>

        ${
            seen && user === username
            ? '<div class="seen">Seen</div>'
            : ''
        }
    `;

    chatBox.appendChild(div);

    scrollBottom();
}


// ---------------- UPDATE SEEN ----------------
function updateSeenStatus(
    messageId,
    seenBy
) {

    const seenDiv =
        document.getElementById(
            "seen-" + messageId
        );

    if (!seenDiv) {
        return;
    }

    seenDiv.innerText =
        "Seen by " + seenBy;
}


// ---------------- SYSTEM MESSAGE ----------------
function addSystemMessage(message) {

    const div =
        document.createElement("div");

    div.className =
        "message system";

    div.innerHTML =
        message;

    chatBox.appendChild(div);

    scrollBottom();
}


// ---------------- AUTO SCROLL ----------------
function scrollBottom() {

    chatBox.scrollTop =
        chatBox.scrollHeight;
}

</script>

</body>
</html>
